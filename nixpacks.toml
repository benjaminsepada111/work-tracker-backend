[phases.build]
cmds = [
    'mkdir -p storage/framework/{sessions,views,cache,testing} storage/logs bootstrap/cache',
    'chmod -R a+rw storage'
]

[start]
cmd = 'php artisan route:clear && php artisan cache:clear && php artisan config:clear && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT'
